spring:
  application:
    name: DataShare
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  output:
    ansi:
      enabled: ALWAYS
  # servlet:
  #   multipart:
  #     enabled: true
  #     max-file-size: 10MB
  #     max-request-size: 10MB

logging:
  level:
    org.springframework.security: DEBUG
    org:
      hibernate:
        type: info
      springframework:
        web:
          filter:
            CommonsRequestLoggingFilter: info
    com:
      openclassrooms:
        datashare: info
    root: info

management:
  endpoints:
    web:
      exposure:
        include: '*'


com:
  openclassrooms:
    datashare:
      jwt:
        secret-key: ${JWT_SECRET_KEY}
        expiration-ms: ${JWT_EXPIRATION_MS}