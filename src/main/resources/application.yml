spring:
  application:
    name: DataShare
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  output:
    ansi:
      enabled: ALWAYS
  # servlet:
  #   multipart:
  #     enabled: true
  #     max-file-size: 10MB
  #     max-request-size: 10MB

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: ${SERVER_SSL_KEY_STORE:ssl/datashare-dev.p12}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:changeit}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:datashare-dev}

logging:
  level:
    org.springframework.security: DEBUG
    org:
      hibernate:
        type: info
      springframework:
        web:
          filter:
            CommonsRequestLoggingFilter: info
    com:
      openclassrooms:
        datashare: info
    root: info

management:
  endpoints:
    web:
      exposure:
        include: '*'

com:
  openclassrooms:
    datashare:
      jwt:
        secret-key: ${JWT_SECRET_KEY}
        expiration-ms: ${JWT_EXPIRATION_MS}
      cookie:
        secure: ${COOKIE_SECURE:true}

# Backblaze B2 Configuration
b2:
  endpoint: ${B2_ENDPOINT}
  region: ${B2_REGION}
  bucket-name: ${B2_BUCKET_NAME}
  key-id: ${B2_KEY_ID}
  application-key: ${B2_APPLICATION_KEY}
